# =============================================================================
# 手动 Release 构建工作流
#
# 触发方式: 手动 (workflow_dispatch)
# 行为:
#   1. 拉取代码
#   2. 自动计算版本号 (上一个标签 + 0.0.1, 起始 1.0.0)
#   3. Release 构建 (assembleRelease)
#   4. 将 APK 发布到 GitHub Release
#
# 约束: ❌ 禁止推送任何代码变更到分支
# =============================================================================

name: Release Build

on:
  workflow_dispatch:
    inputs:
      note:
        description: '构建备注（选填，出现在 Release 标题中）'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Release Build
    runs-on: ubuntu-latest

    steps:
      # ── 1. 拉取代码（含所有标签历史）──────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. 计算下一个版本号 ──────────────────────────────────────
      - name: Calculate next version
        id: version
        run: |
          # 取最新的 tag（按版本排序）
          LATEST_TAG=$(git tag --sort=-version:refname | head -n1)

          if [ -z "$LATEST_TAG" ]; then
            # 没有 tag → 从 1.0.0 开始
            MAJOR=1
            MINOR=0
            PATCH=0
          else
            # 去掉可能的前导 "v"
            TAG="${LATEST_TAG#v}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$TAG"

            # 校验必须是 3 段数字
            if ! [[ "$MAJOR" =~ ^[0-9]+$ ]] || \
               ! [[ "$MINOR" =~ ^[0-9]+$ ]] || \
               ! [[ "$PATCH" =~ ^[0-9]+$ ]]; then
              echo "::error::Latest tag '$LATEST_TAG' is not a valid semver (X.Y.Z)"
              exit 1
            fi

            # 10进制递增：PATCH+1，满10进1
            PATCH=$((PATCH + 1))
            if [ "$PATCH" -ge 10 ]; then
              PATCH=0
              MINOR=$((MINOR + 1))
            fi
          fi

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Previous tag: ${LATEST_TAG:-<none>}"
          echo "New version:  ${NEW_VERSION}"

      # ── 3. Java + Android SDK 环境 ────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── 4. 将新版本号写入 build.gradle.kts（仅构建时，不推送） ───
      - name: Inject versionName for build
        run: |
          sed -i \
            "s/versionName = \".*\"/versionName = \"${{ steps.version.outputs.version }}\"/" \
            app/build.gradle.kts
          echo "Injected versionName = ${{ steps.version.outputs.version }}"

      # ── 5. Release 构建 ───────────────────────────────────────────
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease

      # ── 6. 发布到 GitHub Release ─────────────────────────────────
      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 取构建产物（取第一个 APK）
          APK=$(ls app/build/outputs/apk/release/*.apk 2>/dev/null | head -n1)
          if [ -z "$APK" ]; then
            echo "::error::No APK found at app/build/outputs/apk/release/"
            exit 1
          fi

          VERSION="${{ steps.version.outputs.version }}"
          NOTE="${{ inputs.note || '' }}"

          if [ -n "$NOTE" ]; then
            RELEASE_TITLE="v${VERSION} — ${NOTE}"
          else
            RELEASE_TITLE="v${VERSION}"
          fi

          gh release create "$VERSION" \
            "$APK" \
            --title "$RELEASE_TITLE" \
            --generate-notes

          echo "Published: $RELEASE_TITLE"
