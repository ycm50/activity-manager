# =============================================================================
# 手动 Release 构建工作流
#
# 触发方式: 手动 (workflow_dispatch)
# 行为:
#   1. 拉取代码
#   2. 自动计算版本号（上一个 tag + 0.0.1，10进制满10进1，起始 1.0.0）
#   3. 生成临时签名密钥并用 apksigner 签名
#   4. Release 构建 (assembleRelease) + 对齐 + 签名
#   5. 将签名后的 APK 发布到 GitHub Release
#
# 约束:
#   - ❌ 仅拉取代码，不推送任何变更到分支
#   - 🔑 签名密钥为公开的一次性密钥（开源项目，谁都可以自行构建）
# =============================================================================

name: Release Build

on:
  workflow_dispatch:
    inputs:
      note:
        description: '构建备注（选填，出现在 Release 标题中）'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Release Build
    runs-on: ubuntu-latest

    steps:
      # ── 1. 拉取代码（含所有标签历史）──────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. 计算下一个版本号 ──────────────────────────────────────
      - name: Calculate next version
        id: version
        run: |
          LATEST_TAG=$(git tag --sort=-version:refname | head -n1)

          if [ -z "$LATEST_TAG" ]; then
            MAJOR=1
            MINOR=0
            PATCH=0
          else
            TAG="${LATEST_TAG#v}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$TAG"

            if ! [[ "$MAJOR" =~ ^[0-9]+$ ]] || \
               ! [[ "$MINOR" =~ ^[0-9]+$ ]] || \
               ! [[ "$PATCH" =~ ^[0-9]+$ ]]; then
              echo "::error::Latest tag '$LATEST_TAG' is not a valid semver (X.Y.Z)"
              exit 1
            fi

            # 10进制：PATCH+1，满10进1
            PATCH=$((PATCH + 1))
            if [ "$PATCH" -ge 10 ]; then
              PATCH=0
              MINOR=$((MINOR + 1))
            fi
          fi

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Previous tag: ${LATEST_TAG:-<none>}"
          echo "New version:  ${NEW_VERSION}"

      # ── 3. 环境准备 ───────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle with cache
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-cleanup: true

      # ── 4. Gradle 镜像配置（阿里云 mirror） ─────────────────────
      # 不改代码，通过 init 脚本在 CI 层面替换 Maven Central → 阿里云
      - name: Create Gradle init script with Aliyun mirror
        run: |
          cat > init-ci.gradle << 'SCRIPT'
          // CI 镜像配置 — 仅 CI 环境生效，不碰项目代码
          gradle.settingsEvaluated { settings ->
            settings.pluginManagement.repositories.each { repo ->
              if (repo instanceof MavenArtifactRepository) {
                if (repo.url.toString().contains('repo.maven.apache.org')) {
                  repo.setUrl('https://maven.aliyun.com/repository/public')
                }
                if (repo.url.toString().contains('maven.google.com') || repo.url.toString().contains('dl.google.com')) {
                  repo.setUrl('https://maven.aliyun.com/repository/google')
                }
              }
            }
          }

          gradle.projectsLoaded { g ->
            g.rootProject.buildscript.repositories.each { repo ->
              if (repo instanceof MavenArtifactRepository) {
                if (repo.url.toString().contains('repo.maven.apache.org')) {
                  repo.setUrl('https://maven.aliyun.com/repository/public')
                }
                if (repo.url.toString().contains('maven.google.com') || repo.url.toString().contains('dl.google.com')) {
                  repo.setUrl('https://maven.aliyun.com/repository/google')
                }
              }
            }
            g.rootProject.repositories.each { repo ->
              if (repo instanceof MavenArtifactRepository) {
                if (repo.url.toString().contains('repo.maven.apache.org')) {
                  repo.setUrl('https://maven.aliyun.com/repository/public')
                }
                if (repo.url.toString().contains('maven.google.com') || repo.url.toString().contains('dl.google.com')) {
                  repo.setUrl('https://maven.aliyun.com/repository/google')
                }
              }
            }
          }
          SCRIPT
          echo "init-ci.gradle created"

      # ── 5. 生成临时签名密钥 ──────────────────────────────────────
      - name: Generate throwaway keystore
        run: |
          keytool -genkey -v -keystore release.keystore \
            -alias release -keyalg RSA -keysize 2048 \
            -validity 36500 \
            -storepass android -keypass android \
            -dname "CN=OpenSource, OU=OS, O=OS, L=OS, ST=OS, C=OS"
          echo "Keystore generated at $(pwd)/release.keystore"

      # ── 6. 注入版本号 + Release 构建 ────────────────────────────
      - name: Inject versionName for build
        run: |
          sed -i \
            "s/versionName = \".*\"/versionName = \"${{ steps.version.outputs.version }}\"/" \
            app/build.gradle.kts
          echo "Injected versionName = ${{ steps.version.outputs.version }}"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build unsigned Release APK
        run: ./gradlew -I init-ci.gradle assembleRelease

      # ── 7. 对齐 + 签名 APK ──────────────────────────────────────
      - name: Sign APK with apksigner
        run: |
          BUILD_TOOLS=$(ls -1d "$ANDROID_HOME"/build-tools/* | sort -V | tail -n1)
          APKSIGNER="${BUILD_TOOLS}/apksigner"

          UNSIGNED_APK=$(ls app/build/outputs/apk/release/*.apk | head -n1)
          if [ -z "$UNSIGNED_APK" ]; then
            echo "::error::No APK found to sign"
            exit 1
          fi

          "${BUILD_TOOLS}/zipalign" -p -v 4 \
            "$UNSIGNED_APK" \
            "${UNSIGNED_APK%.apk}-aligned.apk"

          "$APKSIGNER" sign \
            --ks release.keystore \
            --ks-pass pass:android \
            --ks-key-alias release \
            --key-pass pass:android \
            --out "app/build/outputs/apk/release/app-release-signed.apk" \
            "${UNSIGNED_APK%.apk}-aligned.apk"

          echo "Signed APK: app/build/outputs/apk/release/app-release-signed.apk"
          echo "signed_apk=app/build/outputs/apk/release/app-release-signed.apk" >> "$GITHUB_OUTPUT"

      # ── 8. 发布到 GitHub Release ─────────────────────────────────
      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SIGNED_APK="app/build/outputs/apk/release/app-release-signed.apk"
          if [ ! -f "$SIGNED_APK" ]; then
            echo "::error::Signed APK not found at $SIGNED_APK"
            exit 1
          fi

          VERSION="${{ steps.version.outputs.version }}"
          NOTE="${{ inputs.note || '' }}"

          if [ -n "$NOTE" ]; then
            RELEASE_TITLE="v${VERSION} — ${NOTE}"
          else
            RELEASE_TITLE="v${VERSION}"
          fi

          gh release create "$VERSION" \
            "$SIGNED_APK" \
            --title "$RELEASE_TITLE" \
            --generate-notes

          echo "Published: $RELEASE_TITLE"
